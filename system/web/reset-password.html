<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #a0a0a0;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #cccccc;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        input[type="password"]::placeholder {
            color: #666666;
        }

        .password-requirements {
            font-size: 12px;
            color: #888888;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: #e74c3c;
            display: block;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.4);
            color: #2ecc71;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .token-expired {
            text-align: center;
            color: #e74c3c;
        }

        .token-expired h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="resetForm">
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your new password below</p>

            <div id="message" class="message"></div>

            <form id="passwordForm" onsubmit="return handleSubmit(event)">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword"
                           placeholder="Enter new password" required minlength="6">
                    <div class="password-requirements">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Confirm new password" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Reset Password
                </button>
            </form>

            <div class="back-link">
                <a href="/">← Back to Home</a>
            </div>
        </div>

        <div id="tokenExpired" class="token-expired" style="display: none;">
            <h2>Link Expired</h2>
            <p>This password reset link has expired or is invalid.</p>
            <p style="margin-top: 15px;">Please request a new password reset link from the launcher.</p>
        </div>
    </div>

    <script>
        // Get token and email from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        // Get the API base URL from the current page location
        const apiBaseUrl = window.location.origin;

        // Validate we have required parameters
        if (!token || !email) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('tokenExpired').style.display = 'block';
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>Resetting...';
            } else {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return false;
            }

            // Validate password length
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long.', 'error');
                return false;
            }

            setLoading(true);

            try {
                const response = await fetch(`${apiBaseUrl}/api/account/password-reset/confirm`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        token: token,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Password reset successful! You can now log in with your new password.', 'success');
                    document.getElementById('passwordForm').style.display = 'none';

                    // Redirect to home after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showMessage(data.error || 'Failed to reset password. Please try again.', 'error');

                    // If token is invalid/expired, show the expired message
                    if (response.status === 400 && data.error &&
                        (data.error.includes('expired') || data.error.includes('Invalid'))) {
                        document.getElementById('resetForm').style.display = 'none';
                        document.getElementById('tokenExpired').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('Password reset error:', error);
                showMessage('An error occurred. Please try again later.', 'error');
            } finally {
                setLoading(false);
            }

            return false;
        }

        // Validate token on page load (optional)
        async function validateToken() {
            if (!token || !email) return;

            try {
                const response = await fetch(`${apiBaseUrl}/api/account/password-reset/validate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, token })
                });

                if (!response.ok) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('tokenExpired').style.display = 'block';
                }
            } catch (error) {
                console.error('Token validation error:', error);
                // Don't show error on validation failure, let them try to submit
            }
        }

        // Validate token when page loads
        validateToken();
    </script>
</body>
</html>
