// Melia
// Configuration file
//----------------------------------------------------------------------------

// If enabled, monster AIs will utilize pathfinding to reach their target.
// Requires server restart.
monsters_use_pathfinding: yes

// If enabled, monsters can may freely wander the maps and don't restrict
// random movement to their spawn area.
free_roam_monsters: no

// If enabled, monsters will return to their spawn point if they get lured
// away.
monsters_return_home: yes

// If enabled, monsters will be staggered when taking a single hit above
// a damage-% threshold of their max HP, subject to an 800ms cooldown.
// A stagger interrupts the mob's current skill cast and applies a brief
// server-side motion knockback (not shown to the client), giving burst
// and defensive play a counter to mob wind-ups.
// Elites, Bosses, and Mythic mobs cannot be staggered.
// Disabled by default.
monster_stagger: no

include "/user/conf/world/ai.conf"
